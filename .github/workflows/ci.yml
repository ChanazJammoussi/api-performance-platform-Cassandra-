name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Tests unitaires (detection-service)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: detection-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Installer les dependances (+ pytest)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lancer la suite de tests
        run: python -m pytest -q
