receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  attributes/pii_redaction:
    actions:
      - key: http.url
        action: delete
      - key: http.target
        action: delete
      - key: net.peer.ip
        action: delete
      - key: enduser.id
        action: delete
      - key: user.id
        action: delete

  batch:
    timeout: 10s
    send_batch_size: 1000

connectors:
  spanmetrics:
    histogram:
      explicit:
        buckets: [2ms, 4ms, 6ms, 8ms, 10ms, 50ms, 100ms, 200ms, 400ms, 800ms, 1s, 1400ms, 2s, 5s, 10s, 15s]
    dimensions:
      - name: http.method
      - name: http.route
      - name: http.status_code
    metrics_expiration: 5m

exporters:
  debug:
    verbosity: basic

  prometheusremotewrite:
    endpoint: "http://prometheus:9090/api/v1/write"
    tls:
      insecure: true
    resource_to_telemetry_conversion:
      enabled: true
    target_info:
      enabled: false

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [attributes/pii_redaction, batch]
      exporters: [spanmetrics, debug]
    metrics:
      receivers: [spanmetrics]
      processors: [batch]
      exporters: [debug, prometheusremotewrite]
