services:

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: cassandra-timescaledb
    environment:
      POSTGRES_USER: cassandra
      POSTGRES_PASSWORD: cassandra
      POSTGRES_DB: cassandra
    ports:
      - "5434:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./timescaledb/init.sql:/docker-entrypoint-initdb.d/init.sql

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: cassandra-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-remote-write-receiver'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - timescaledb

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.0
    container_name: cassandra-otel-collector
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector/config.yaml:/etc/otel/config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
    depends_on:
      - timescaledb
      - prometheus

  grafana:
    image: grafana/grafana:10.4.0
    container_name: cassandra-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

  orders:
    build: ./services/orders
    container_name: cassandra-orders
    ports:
      - "8001:8001"
    depends_on:
      - otel-collector
      - timescaledb
    environment:
      - DATABASE_URL=postgresql://cassandra:cassandra@timescaledb:5432/cassandra

  payments:
    build: ./services/payments
    container_name: cassandra-payments
    ports:
      - "8002:8002"
    depends_on:
      - otel-collector
      - orders
    environment:
      - ORDERS_URL=http://orders:8001

  gateway:
    build: ./services/gateway
    container_name: cassandra-gateway
    ports:
      - "8000:8000"
    depends_on:
      - otel-collector
      - orders
      - payments
    environment:
      - ORDERS_URL=http://orders:8001
      - PAYMENTS_URL=http://payments:8002

  # --- Detection service (3 process : scraper / detector / baseline) ---------
  scraper:
    build: ./detection-service
    container_name: cassandra-scraper
    command: ["python", "-u", "scraper.py"]
    depends_on:
      - timescaledb
      - prometheus
    environment:
      - DATABASE_URL=postgresql://cassandra:cassandra@timescaledb:5432/cassandra
      - PROMETHEUS_URL=http://prometheus:9090

  detector:
    build: ./detection-service
    container_name: cassandra-detector
    command: ["python", "-u", "detector.py"]
    depends_on:
      - timescaledb
    environment:
      - DATABASE_URL=postgresql://cassandra:cassandra@timescaledb:5432/cassandra
      - GROUND_TRUTH_DIR=/data/results
      - MODEL_DIR=/app/models
      - METRICS_PORT=9101
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    ports:
      - "9101:9101"          # /metrics Prometheus du detecteur
    volumes:
      - ./scenario-runner/results:/data/results:ro
      - models_data:/app/models

  baseline:
    build: ./detection-service
    container_name: cassandra-baseline
    command: ["python", "-u", "baseline_job.py", "--loop", "--interval", "3600"]
    depends_on:
      - timescaledb
    environment:
      - DATABASE_URL=postgresql://cassandra:cassandra@timescaledb:5432/cassandra
      - GROUND_TRUTH_DIR=/data/results
    volumes:
      - ./scenario-runner/results:/data/results:ro

  # --- Monitoring du drift du modele ML (audit #10) -------------------------
  # Compare periodiquement la distribution des scores ML live a la reference
  # d'entrainement (KS) et ecrit dans model_health (dashboard self-obs).
  model-monitor:
    build: ./detection-service
    container_name: cassandra-model-monitor
    command: ["python", "-u", "model_monitor.py", "--loop", "--interval", "1800"]
    depends_on:
      - timescaledb
    environment:
      - DATABASE_URL=postgresql://cassandra:cassandra@timescaledb:5432/cassandra
      - MODEL_DIR=/app/models
    volumes:
      - models_data:/app/models

  deploy-api:
    build: ./detection-service
    container_name: cassandra-deploy-api
    command: ["uvicorn", "deploy_api:app", "--host", "0.0.0.0", "--port", "8090"]
    ports:
      - "8090:8090"
    depends_on:
      - timescaledb
    environment:
      - DATABASE_URL=postgresql://cassandra:cassandra@timescaledb:5432/cassandra

  # --- Trainer ML : refit nightly de l'Isolation Forest (spec 8.3) -----------
  # Ecrit l'artefact dans le volume partage models_data ; le detector recharge
  # automatiquement le pointeur latest quand il change. Exclut les fenetres
  # d'injection (test set) via GROUND_TRUTH_DIR.
  trainer:
    build: ./detection-service
    container_name: cassandra-trainer
    command: ["python", "-u", "train_model.py", "--loop", "--interval", "86400"]
    depends_on:
      - timescaledb
    environment:
      - DATABASE_URL=postgresql://cassandra:cassandra@timescaledb:5432/cassandra
      - GROUND_TRUTH_DIR=/data/results
      - MODEL_DIR=/app/models
    volumes:
      - ./scenario-runner/results:/data/results:ro
      - models_data:/app/models

volumes:
  timescaledb_data:
  grafana_data:
  prometheus_data:
  models_data:
