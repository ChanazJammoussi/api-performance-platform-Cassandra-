apiVersion: 1

providers:
  - name: Cassandra
    orgId: 1
    folder: Cassandra
    folderUid: cassandra-folder
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
