apiVersion: 1

datasources:
  - name: TimescaleDB
    uid: DS_TIMESCALEDB
    type: postgres
    url: timescaledb:5432
    user: cassandra
    secureJsonData:
      password: cassandra
    jsonData:
      database: cassandra
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 10
      connMaxLifetime: 14400
      postgresVersion: 1600
      timescaledb: true
    isDefault: true
    editable: false
